# Split central role — dongle scans for the two BLE peripherals (left + right)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_BT=y
CONFIG_BT_CENTRAL=y

# Dongle is the USB host transport — must explicitly enable the USB device stack
# and ZMK's USB HID transport. USB_DEVICE_STACK is a hard dep of ZMK_USB;
# without it ZMK_USB silently becomes n even though the build succeeds.
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y

# ZMK Studio requires a physical_layout node with per-key coordinates.
# Uncomment below only after adding that node to the shield dtsi.
# CONFIG_ZMK_STUDIO=y
